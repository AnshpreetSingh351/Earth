<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Real Estate Map</title>

  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet"/>

    <style>
    :root {
      --panel-bg: rgba(25, 25, 25, 0.7);
      --button-bg: rgba(255, 255, 255, 0.08);
      --button-hover: rgba(255, 255, 255, 0.15);
      --accent-color: #00BFFF;
      --text-color: #ffffff;
    }

    body { 
      margin: 0; 
      font-family: 'Inter', sans-serif;
      background-color: #1a1a1a; /* Fallback */
    }

    #map { 
      width: 100%; 
      height: 100vh; 
      background: #242424; /* Placeholder for actual map */
    }

    /* THE PANEL: Glassmorphism effect */
    #panel {
      position: fixed;
      right: 30px;
      top: 50%;
      transform: translateY(-50%);
      
      background: var(--panel-bg);
      backdrop-filter: blur(12px); /* The secret to premium feel */
      -webkit-backdrop-filter: blur(12px);
      
      padding: 24px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1); /* Subtle border */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 1000;
      width: 200px;
    }

    /* PANEL TITLE (Optional addition for premium look) */
    #panel::before {
      content: "PROJECTS";
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 15px;
      font-weight: 600;
    }

    /* BUTTONS: Refined styling */
    #panel button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      padding: 12px 16px;
      background: var(--button-bg);
      color: var(--text-color);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* Smooth easing */
    }

    #panel button:last-child {
      margin-bottom: 0;
    }

    #panel button:hover {
      background: var(--button-hover);
      transform: translateX(-5px); /* Subtle movement on hover */
      border-color: rgba(255, 255, 255, 0.2);
    }

    #panel button:active {
      transform: scale(0.97);
    }

    /* MARKER: Adding a "Glow" effect */
    .marker {
      width: 16px;
      height: 16px;
      background: var(--accent-color);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid white;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.6);
      transition: transform 0.2s ease;
    }

    .marker:hover {
      transform: scale(1.3);
    }
  </style>
</head>

<body>


<div id="map">
    <!-- Map would go here -->
</div>

<div id="panel">
  <button onclick="focusProject(0)">London Square</button>
  <button onclick="focusProject(1)">CM Infinia</button>
</div>

<script>
  function focusProject(id) {
    console.log("Focusing project:", id);
  }
</script>

<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/three@0.126.1/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.126.1/examples/js/loaders/GLTFLoader.js"></script>

<script src="script.js"></script>

</body>
</html>
